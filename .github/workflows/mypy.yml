name: mypy

on:
  pull_request:
  workflow_call:

concurrency:
  group: mypy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # setuptools-scm needs tags to compute version

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip

    - name: mypy
      run: |
        pip install mypy
        pip install '.[CI]'
        mypy --install-types --non-interactive src/stardust test/
